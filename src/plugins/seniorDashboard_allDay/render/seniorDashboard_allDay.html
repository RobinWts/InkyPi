{% extends "plugin.html" %}

{% block content %}

<script src="{{static_dir}}/scripts/calendar.min.js" charset="UTF-8"></script>

<div class="dashboard-container">
    <div class="dashboard-left">
        <div id="calendar" class="calendar" style="
        --fc-page-bg-color: {{ plugin_settings.backgroundColor or white }};
        --fc-border-color: {{ plugin_settings.textColor }};
        --fc-today-bg-color: '';
        --fc-event-border-color: {{ plugin_settings.textColor or white }};

        --fc-small-font-size: {{ 0.85 * font_scale }}em;
        --fc-title-font-size: {{ 1.75 * font_scale }}em;
        --fc-table-font-size: {{ 1 * font_scale }}em;
        ">

        </div>
    </div>
    <div class="dashboard-right">
        <!-- Right side content will be added here -->
    </div>
</div>

<script>
    const events = {{ events | tojson }};

    document.addEventListener('DOMContentLoaded', function () {
        const calendarEl = document.getElementById('calendar');
        const timeFormat = {
            hour: "numeric",
            minute: "2-digit",
            omitZeroMinute: {{ (time_format == "12h") | tojson
    }},
        hour12: {{ (time_format == "12h") | tojson }},
        meridiem: 'short'
        };

    const locale = "{{ plugin_settings.language or 'en' }}";
    const timezone = "{{ timezone }}";

    // Create date object from ISO string to handle timezone correctly
    const currentDate = new Date('{{ current_dt }}');

    // Format date to match listMonth date headers (e.g., "January 27, 2026")
    // Using the same format that FullCalendar uses for listMonth day headers (without weekday)
    const dateFormatter = new Intl.DateTimeFormat(locale, {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        timeZone: timezone
    });
    const formattedTitle = dateFormatter.format(currentDate);

    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'listMonth',
        events: events,
        now: '{{ current_dt }}',
        timeZone: '{{ timezone }}',
        contentHeight: '100%',
        expandRows: true,
        locale: locale,
        eventTimeFormat: timeFormat,
        displayEventTime: true,
        weekends: true,
        fixedWeekCount: false,
        headerToolbar: {
            left: '',
            center: 'title',
            right: ''
        },
        datesSet: function () {
            // Update the title with the formatted current date after calendar renders
            const titleElement = calendarEl.querySelector('.fc-toolbar-title');
            if (titleElement) {
                titleElement.textContent = formattedTitle;
            }
        }
    });
    calendar.render();
    });
</script>

{% endblock %}
